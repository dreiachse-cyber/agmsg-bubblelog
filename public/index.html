<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bubblelog</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <header class="brand">
          <p>ローカル会話ログビューア</p>
          <h1>Bubblelog</h1>
        </header>

        <section class="panel">
          <h2>チーム</h2>
          <div id="teamList" class="team-list"></div>
        </section>

        <section class="panel">
          <h2>表示</h2>
          <label class="field">
            件数
            <select id="limitSelect">
              <option value="40">40</option>
              <option value="80" selected>80</option>
              <option value="160">160</option>
              <option value="300">300</option>
            </select>
          </label>
          <label class="toggle">
            <input id="compactToggle" type="checkbox" checked>
            コンパクト表示
          </label>
          <label class="toggle">
            <input id="controlToggle" type="checkbox">
            制御ログも表示
          </label>
        </section>
      </aside>

      <main class="chat-shell">
        <header class="chat-header">
          <button
            id="sidebarToggle"
            class="icon-button"
            type="button"
            title="チーム欄を閉じる"
            aria-controls="sidebar"
            aria-expanded="true"
          >☰</button>
          <div class="title-block">
            <p id="teamCaption">チーム未選択</p>
            <h2 id="chatTitle">ログを選んでください</h2>
          </div>
          <button id="refreshButton" class="icon-button" type="button" title="更新" aria-label="更新">↻</button>
        </header>

        <section id="statusLine" class="status-line">ローカルチームを読み込み中です。</section>
        <section class="message-area">
          <section id="messageList" class="message-list" aria-live="polite"></section>
          <button id="newMessageButton" class="new-message-button" type="button" hidden>↓ 新着</button>
        </section>
      </main>
    </div>

    <div id="avatarModal" class="modal-backdrop" hidden>
      <section class="avatar-modal" role="dialog" aria-modal="true" aria-labelledby="avatarModalTitle">
        <header class="modal-header">
          <div class="modal-title-block">
            <p id="avatarModalAgent">agent</p>
            <h2 id="avatarModalTitle">顔アイコン</h2>
          </div>
          <button id="avatarModalClose" class="icon-button" type="button" title="閉じる" aria-label="閉じる">×</button>
        </header>
        <div id="avatarGrid" class="avatar-grid"></div>
        <footer class="modal-footer">
          <button id="avatarResetButton" class="text-button" type="button">標準に戻す</button>
        </footer>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
